name: Build Windows package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0). A tag v<version> will be created.'
        required: true
        default: '0.0.0-dev'
      publish:
        description: 'Publish a GitHub Release for this version'
        type: boolean
        required: false
        default: true

permissions:
  contents: write

env:
  LLVM_MINGW: llvm-mingw-20260616-ucrt-ubuntu-22.04-x86_64

jobs:
  build-win:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="${{ github.event.inputs.version }}"
          fi
          echo "version=${V}" >> "$GITHUB_OUTPUT"
          echo "Building version ${V}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          curl -sL -o llvm-mingw.tar.xz \
            "https://github.com/mstorsjo/llvm-mingw/releases/download/20260616/${LLVM_MINGW}.tar.xz"
          tar xf llvm-mingw.tar.xz
          echo "$PWD/${LLVM_MINGW}/bin" >> "$GITHUB_PATH"

      - name: Build
        run: make -j"$(nproc)"

      - name: Smoke test
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq wine64 >/dev/null
          file modem73.exe
          timeout 30 wine modem73.exe --help

      - name: Package
        run: |
          mkdir -p dist
          cp modem73.exe dist/
          cp README.md CONTROL_PORT.md LICENSE dist/
          (cd dist && zip "../modem73_${{ steps.ver.outputs.version }}_win64.zip" *)
          sha256sum modem73_*_win64.zip | tee modem73_${{ steps.ver.outputs.version }}_win64.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: modem73-win64
          path: |
            modem73_*_win64.zip
            modem73_*_win64.zip.sha256

  release:
    needs: build-win
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
    runs-on: ubuntu-24.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || '' }}
          name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || '' }}
          files: |
            dist/modem73_*_win64.zip
            dist/modem73_*_win64.zip.sha256
          generate_release_notes: true
          fail_on_unmatched_files: false
